<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comic Library</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #059669;
      --warning: #b45309;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: #111827;
      color: #fff;
      padding: 24px 16px;
    }

    .header-inner,
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0;
      color: #d1d5db;
      font-size: 14px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      margin: 20px 0;
    }

    input[type="text"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .status-line {
      margin: 10px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .warning-line {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--warning);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
      padding-bottom: 40px;
    }

    .book-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .book-image-wrap {
      background: #f3f4f6;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .book-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .book-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .book-meta {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .book-notes {
      margin: 0;
      color: #374151;
      font-size: 14px;
      line-height: 1.4;
    }

    .book-status {
      display: inline-block;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .book-status.available {
      background: #ecfdf5;
      color: var(--success);
    }

    .book-status.borrowed {
      background: #fef2f2;
      color: var(--danger);
    }

    .request-btn {
      margin-top: auto;
      border: 0;
      background: var(--primary);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .request-btn:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .request-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .empty-state,
    .error-state {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-header,
    .modal-body,
    .modal-footer {
      padding: 16px 18px;
    }

    .modal-header {
      border-bottom: 1px solid var(--border);
    }

    .modal-footer {
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      border: 0;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .helper {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 700px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Comic Library</h1>
      <p class="subtitle">Browse the collection and submit a borrowing request.</p>
    </div>
  </header>

  <main class="container">
    <section class="library-stats">
      <div class="stat-card">
        <div class="stat-number" id="statTotalBooks">0</div>
        <div class="stat-label">Books</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statTotalSeries">0</div>
        <div class="stat-label">Series</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statAvailableBooks">0</div>
        <div class="stat-label">Available</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statBorrowedBooks">0</div>
        <div class="stat-label">Borrowed</div>
      </div>
    </section>

    <div class="toolbar">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by title, series, notes, location, age or id"
      />
      <select id="statusFilter">
        <option value="all">All books</option>
        <option value="available">Available</option>
        <option value="borrowed">Borrowed</option>
      </select>
    </div>

    <p id="statusLine" class="status-line">Loading books...</p>
    <p id="warningLine" class="warning-line hidden"></p>
    <div id="requestFeedback" class="request-feedback hidden"></div>

    <div id="errorState" class="error-state hidden"></div>
    <div id="emptyState" class="empty-state hidden">No books found.</div>
    <div id="bookList" class="grid"></div>
  </main>

  <div id="requestModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="requestModalTitle">
      <div class="modal-header">
        <h2 id="requestModalTitle" style="margin:0; font-size:20px;">Request Book</h2>
        <p id="requestBookTitle" style="margin:8px 0 0; color:#111827; font-weight:700;"></p>
        <p id="requestBookMeta" style="margin:6px 0 0; color:#6b7280; font-size:14px;"></p>
      </div>

      <form id="requestForm">
        <div class="modal-body">
          <div id="modalRequestFeedback" class="modal-request-feedback hidden"></div>
          <div style="display:grid; gap:12px;">
            <div>
              <label for="requester_name">Your name</label>
              <input type="text" id="requester_name" name="requester_name" required />
            </div>

            <div>
              <label for="contact">Contact</label>
              <input type="text" id="contact" name="contact" required placeholder="Email or phone" />
            </div>

            <div>
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Optional note"></textarea>
              <div class="helper">Your request will be reviewed by the admin.</div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelRequestBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitRequestBtn">Submit Request</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allBooks = [];
    let selectedBookId = '';
    let selectedBookTitle = '';

    const bookListEl = document.getElementById('bookList');
    const emptyStateEl = document.getElementById('emptyState');
    const errorStateEl = document.getElementById('errorState');
    const statusLineEl = document.getElementById('statusLine');
    const warningLineEl = document.getElementById('warningLine');
    const requestFeedbackEl = document.getElementById('requestFeedback');
    const modalRequestFeedbackEl = document.getElementById('modalRequestFeedback');
    const statTotalBooksEl = document.getElementById('statTotalBooks');
    const statTotalSeriesEl = document.getElementById('statTotalSeries');
    const statAvailableBooksEl = document.getElementById('statAvailableBooks');
    const statBorrowedBooksEl = document.getElementById('statBorrowedBooks');
    const searchInputEl = document.getElementById('searchInput');
    const statusFilterEl = document.getElementById('statusFilter');
    const requestModalEl = document.getElementById('requestModal');
    const requestBookTitleEl = document.getElementById('requestBookTitle');
    const requestBookMetaEl = document.getElementById('requestBookMeta');
    const requestFormEl = document.getElementById('requestForm');
    const submitRequestBtnEl = document.getElementById('submitRequestBtn');
    const cancelRequestBtnEl = document.getElementById('cancelRequestBtn');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeJs(value) {
      return String(value ?? '')
        .replaceAll('\\', '\\\\')
        .replaceAll("'", "\\'");
    }

    function showRequestFeedback(message, type = 'info') {
      requestFeedbackEl.textContent = message;
      requestFeedbackEl.className = `request-feedback ${type}`;
      requestFeedbackEl.classList.remove('hidden');
    }

    function clearRequestFeedback() {
      requestFeedbackEl.textContent = '';
      requestFeedbackEl.className = 'request-feedback hidden';
    }

    function showModalRequestFeedback(message, type = 'success') {
      modalRequestFeedbackEl.textContent = message;
      modalRequestFeedbackEl.className = `modal-request-feedback ${type}`;
      modalRequestFeedbackEl.classList.remove('hidden');
    }

    function clearModalRequestFeedback() {
      modalRequestFeedbackEl.textContent = '';
      modalRequestFeedbackEl.className = 'modal-request-feedback hidden';
    }

    function updateLibraryStats(books) {
      const totalBooks = books.length;

      const uniqueSeries = new Set(
        books
          .map(book => String(book.series || '').trim())
          .filter(Boolean)
      );

      const availableBooks = books.filter(book => book.availability === 'Available').length;
      const borrowedBooks = books.filter(book => book.availability === 'Borrowed').length;

      statTotalBooksEl.textContent = totalBooks;
      statTotalSeriesEl.textContent = uniqueSeries.size;
      statAvailableBooksEl.textContent = availableBooks;
      statBorrowedBooksEl.textContent = borrowedBooks;
    }

    function normalizeStatus(value) {
      const s = String(value || '').trim().toLowerCase();
      return s === 'borrowed' ? 'Borrowed' : 'Available';
    }

    function normalizeBookRow(row) {
      const id = String(row.id ?? '').trim();
      const title = String(row.title ?? '').trim();
      const series = String(row.series ?? '').trim();
      const volume = String(row.volume ?? '').trim();
      const status = normalizeStatus(row.status);
      const notes = String(row.notes ?? '').trim();
      const age = String(row.age ?? '').trim();
      const image = String(row.image ?? '').trim();
      const location = String(row.location ?? '').trim();

      return {
        id,
        title,
        series,
        volume,
        status,
        notes,
        age,
        image,
        location
      };
    }

    async function fetchBorrowedBookIdsSafe() {
      try {
        const { data, error } = await supabaseClient
          .from('requests')
          .select('book_id')
          .eq('status', 'Done');

        if (error) {
          console.warn('Borrowed-state fetch failed:', error);
          warningLineEl.textContent = 'Books loaded, but live borrowed status is unavailable right now.';
          warningLineEl.classList.remove('hidden');
          return new Set();
        }

        warningLineEl.classList.add('hidden');
        warningLineEl.textContent = '';

        return new Set(
          (data || [])
            .map(row => String(row.book_id || '').trim())
            .filter(Boolean)
        );
      } catch (err) {
        console.warn('Borrowed-state fetch failed:', err);
        warningLineEl.textContent = 'Books loaded, but live borrowed status is unavailable right now.';
        warningLineEl.classList.remove('hidden');
        return new Set();
      }
    }

    function parseBooksCsv() {
      return new Promise((resolve, reject) => {
        Papa.parse('books.csv', {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            resolve(results);
          },
          error: function(err) {
            reject(err);
          }
        });
      });
    }

    async function loadBooks() {
      statusLineEl.textContent = 'Loading books...';
      errorStateEl.classList.add('hidden');
      emptyStateEl.classList.add('hidden');
      bookListEl.innerHTML = '';

      try {
        const [borrowedBookIds, results] = await Promise.all([
          fetchBorrowedBookIdsSafe(),
          parseBooksCsv()
        ]);

        const rows = Array.isArray(results.data) ? results.data : [];

        allBooks = rows
          .map(normalizeBookRow)
          .filter(book => book.id && book.title)
          .map(book => {
            const finalStatus = borrowedBookIds.has(book.id) ? 'Borrowed' : 'Available';
            return {
              ...book,
              availability: finalStatus
            };
          });

        updateLibraryStats(allBooks);
        updateLibraryStats(allBooks);
        renderFilteredBooks();
      } catch (err) {
        console.error('Load error:', err);
        showError('Failed to load books.csv. Check that books.csv exists in the same folder as index.html and has headers: id,title,series,volume,status,notes,age,image,location');
      }
    }

    function renderFilteredBooks() {
      const search = searchInputEl.value.trim().toLowerCase();
      const filter = statusFilterEl.value;

      const filtered = allBooks.filter(book => {
        const haystack = [
          book.id,
          book.title,
          book.series,
          book.volume,
          book.notes,
          book.age,
          book.location
        ].join(' ').toLowerCase();

        const matchesSearch = !search || haystack.includes(search);

        const matchesFilter =
          filter === 'all' ||
          (filter === 'available' && book.availability === 'Available') ||
          (filter === 'borrowed' && book.availability === 'Borrowed');

        return matchesSearch && matchesFilter;
      });

      renderBooks(filtered, allBooks.length);
    }

    function renderBooks(books, totalCount) {
      bookListEl.innerHTML = '';
      errorStateEl.classList.add('hidden');

      if (!allBooks.length) {
        statusLineEl.textContent = 'No books loaded.';
        emptyStateEl.classList.remove('hidden');
        return;
      }

      statusLineEl.textContent = `Showing ${books.length} of ${totalCount} books`;
      emptyStateEl.classList.toggle('hidden', books.length > 0);

      if (!books.length) return;

      bookListEl.innerHTML = books.map(renderBookCard).join('');
    }

    function renderBookCard(book) {
      const isBorrowed = book.availability === 'Borrowed';
      const imageSrc = book.image || '';

      return `
        <div class="book-card">
          <div class="book-image-wrap">
            ${
              imageSrc
                ? `<img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(book.title)}" loading="lazy" />`
                : `<div style="padding:16px; color:#6b7280;">No image</div>`
            }
          </div>

          <div class="book-body">
            <h3 class="book-title">${escapeHtml(book.title)}</h3>
            <p class="book-meta">Series: ${escapeHtml(book.series || '-')}</p>
            <p class="book-meta">Volume: ${escapeHtml(book.volume || '-')}</p>
            <p class="book-meta">Age: ${escapeHtml(book.age || '-')}</p>
            <p class="book-meta">Location: ${escapeHtml(book.location || '-')}</p>
            <p class="book-meta">ID: ${escapeHtml(book.id)}</p>
            ${book.notes ? `<p class="book-notes">${escapeHtml(book.notes)}</p>` : ''}

            <span class="book-status ${isBorrowed ? 'borrowed' : 'available'}">
              ${escapeHtml(book.availability)}
            </span>

            <button
              class="request-btn"
              ${isBorrowed ? 'disabled' : ''}
              onclick="openRequestModal('${escapeJs(book.id)}', '${escapeJs(book.title)}')"
            >
              ${isBorrowed ? 'Unavailable' : 'Request'}
            </button>
          </div>
        </div>
      `;
    }

    function showError(message) {
      errorStateEl.textContent = message;
      errorStateEl.classList.remove('hidden');
      emptyStateEl.classList.add('hidden');
      statusLineEl.textContent = 'Error';
    }

    function openRequestModal(bookId, bookTitle) {
      selectedBookId = String(bookId || '').trim();
      selectedBookTitle = String(bookTitle || '').trim();

      if (!selectedBookId || !selectedBookTitle) {
        showRequestFeedback('Invalid book selection.', 'error');
        return;
      }

      clearModalRequestFeedback();
      requestBookTitleEl.textContent = selectedBookTitle;
      requestBookMetaEl.textContent = `Book ID: ${selectedBookId}`;
      requestModalEl.style.display = 'flex';
      requestModalEl.setAttribute('aria-hidden', 'false');
    }

    function closeRequestModal() {
      requestFormEl.reset();
      selectedBookId = '';
      selectedBookTitle = '';
      requestBookTitleEl.textContent = '';
      requestBookMetaEl.textContent = '';
      clearModalRequestFeedback();
      requestModalEl.style.display = 'none';
      requestModalEl.setAttribute('aria-hidden', 'true');
    }

    async function submitRequest(event) {
      event.preventDefault();

      const requesterName = document.getElementById('requester_name').value.trim();
      const contact = document.getElementById('contact').value.trim();
      const message = document.getElementById('message').value.trim();

      clearRequestFeedback();
      clearModalRequestFeedback();

      if (!selectedBookId || !selectedBookTitle) {
        showModalRequestFeedback('No book selected.', 'error');
        return;
      }

      if (!requesterName || !contact) {
        showModalRequestFeedback('Please complete all required fields.', 'error');
        return;
      }

      submitRequestBtnEl.disabled = true;
      submitRequestBtnEl.textContent = 'Sending...';

      try {
        const { error } = await supabaseClient.rpc('submit_request', {
          p_book_id: selectedBookId,
          p_book_title: selectedBookTitle,
          p_requester_name: requesterName,
          p_contact: contact,
          p_message: message
        });

        if (error) {
          console.error('RPC error:', error);
          showModalRequestFeedback('Could not send your request. Please try again.', 'error');
          return;
        }

        const sentTitle = selectedBookTitle;

        showModalRequestFeedback('Request sent successfully to Artyom’s Library.', 'success');

        setTimeout(() => {
          closeRequestModal();
          showRequestFeedback(
            `Thanks for your request. "${sentTitle}" was sent to Artyom’s Library.`,
            'success'
          );
          submitRequestBtnEl.disabled = false;
          submitRequestBtnEl.textContent = 'Submit Request';
        }, 1400);

      } catch (err) {
        console.error('Unexpected submit error:', err);
        showModalRequestFeedback('Could not send your request. Please try again.', 'error');
        submitRequestBtnEl.disabled = false;
        submitRequestBtnEl.textContent = 'Submit Request';
      }
    }

    searchInputEl.addEventListener('input', renderFilteredBooks);
    statusFilterEl.addEventListener('change', renderFilteredBooks);
    requestFormEl.addEventListener('submit', submitRequest);
    cancelRequestBtnEl.addEventListener('click', closeRequestModal);

    requestModalEl.addEventListener('click', (event) => {
      if (event.target === requestModalEl) closeRequestModal();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && requestModalEl.style.display === 'flex') {
        closeRequestModal();
      }
    });

    loadBooks();
  </script>
</body>
</html>
