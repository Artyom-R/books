<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artyom’s Comic Library 📚</title>
<style>
body { font-family: Arial; background:#f5f7fb; text-align:center; }
h1 { color:#333; }
.grid { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
.card { background:white; border-radius:10px; padding:10px; width:180px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.card img { width:100%; border-radius:8px; }
button { background:#ff9800; border:none; padding:10px; border-radius:8px; cursor:pointer; color:white; }
.available { color:green; }
.borrowed { color:red; }
</style>
</head>
<body>

<h1>Artyom’s Comic Library 📚</h1>
<p>Choose a book and request to borrow it</p>

<div id="grid" class="grid"></div>

<script>
const ownerEmail = "your-email@example.com";

fetch("books.csv")
.then(response => response.text())
.then(data => {
    const rows = data.split("\n").slice(1);
    const grid = document.getElementById("grid");

    rows.forEach(row => {
        if(!row) return;
        const [title,series,volume,status,notes,image] = row.split(",");

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${image}">
            <h3>${title}</h3>
            <p>${series}</p>
            <p class="${status === "Available" ? "available" : "borrowed"}">${status}</p>
            <button onclick="requestBook('${title}')">📖 Request</button>
        `;

        grid.appendChild(card);
    });
});

function requestBook(title){
    window.location.href = `mailto:${ownerEmail}?subject=Book Request&body=I want to borrow ${title}`;
}
</script>

</body>
</html>
